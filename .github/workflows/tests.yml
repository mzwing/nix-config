name: Tests

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Test flake and workflows
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = false
            substituters = https://mzwing.cachix.org https://cache.nixos.org https://nix-community.cachix.org https://attic.xuyh0120.win/lantian
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= mzwing.cachix.org-1:tOO3NqAwrXyPCnecEl/0wXwparCRksM5TeuS/wZK+KA= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= lantian:EeAUQ+W+6r7EtwnmYjeVwx5kOGEBpjlBfPlzGlTNvHc=

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - name: Check flake
        run: devenv shell --no-reload -- just flake-check

      - name: Type-check Nix
        run: devenv shell --no-reload -- just typecheck

      - name: Lint GitHub Actions
        run: devenv shell --no-reload -- actionlint

      - name: Check formatting
        run: |
          devenv shell --no-reload -- just fmt
          if git status --porcelain | grep -q .; then
            git status --short
            exit 1
          fi
